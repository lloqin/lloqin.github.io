<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gradient Text Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- YOUR CHUNK STARTS -->
  <h3 id="siteTitle"></h3>
  <p id="subtitle">Best in dark mode. Gradient visible on mobile app only.</p>

  <input type="text" id="textInput" value="Change this text">

  <div id="controls">
    <div class="control-group">
      <label style="align-self:center;">Color Presets</label>
      <div class="control-row">
        <select id="presetSelect">
          <option value="pastelRainbow" selected>🌈 Pastel Rainbow</option>
          <option value="random">🎨 Random (always different)</option>
          <option value="siblings">🫂 Sibling Colors (always different)</option>
          <optgroup label="── Local Presets ──" id="localPresetsGroup"></optgroup>
        </select>
        <button id="applyPresetBtn">Apply</button>
      </div>
      <div class="control-row" style="margin-top:5px;">
        <button id="saveLocalBtn" class="secondary">Save Local</button>
        <button id="exportBtn" class="secondary">Export</button>
        <button id="importBtn" class="secondary">Import</button>
        <button id="clearPresetsBtn" class="secondary" style="background:#8b2020;">Clear</button>
      </div>
    </div>

    <div class="control-group">
      <label style="align-self:center;">Options</label>
      <div class="control-row">
        <label style="font-size:13px; color:#ccc; margin-right:2px;"># of Colors</label>
        <select id="colorCountSelect">
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6" selected>6</option>
          <option value="7">7</option>
          <option value="8">8</option>
        </select>
        <button id="reverseGradient">Reverse</button>
        <button id="themeToggle" class="secondary">Light Mode</button>
      </div>
    </div>
  </div>

  <div id="colorSection">
    <div class="control-group" style="align-items:center;">
      <label style="align-self:center;">Colors</label>
      <div id="colorContainer"></div>
    </div>
  </div>

  <div id="preview" class="preview"></div>

  <button id="copyBtn">Copy Code</button>

  <div id="output"></div>

  <!-- modals -->
  <div class="modal-overlay" id="saveModal"> ... </div>
  <div class="modal-overlay" id="exportModal"> ... </div>
  <div class="modal-overlay" id="importModal"> ... </div>
  <div class="modal-overlay" id="clearModal"> ... </div>

  <div id="credit"></div>
  <!-- YOUR CHUNK ENDS -->

  <script src="script.js"></script>
</body>
</html>
